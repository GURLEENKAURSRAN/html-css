<!DOCTYPE html>
<html>
    <head>
        <title>Text Boxes</title>
        <style>
            .yes,
            .no,
            .thanks
            {
                display:inline-block;
                vertical-align:middle;
            }

            .thanks{
                width:190px;
            }

            .yes{
                margin-left:10px;
                padding-left:5px;
                padding-right:5px;
                width:25px;
                color:black;
            }
            .no{
                padding-left:5px;
                padding-right:5px;
                width:20px;
            }
            
        </style>
    </head>
    <body>
        <p class="thanks">Thanks for chatting with our customer support. would you like to take our quick survey?</p>
        <input class="yes" type="text" placeholder="Yes">
        <input class="no" type="text" placeholder="No">
    </body>
</html>
