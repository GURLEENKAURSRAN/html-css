<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up Form</title>
        <style>
            .name1,.name2{
                display:inline-block;
                padding-top:5px;
                padding-bottom:5px;
            }

            .name1{
                width:100px;
                padding-top:5px;
                padding-bottom:5px;
            }
            .name2{
                width:100px;
                padding-top:5px;
                padding-bottom:5px;
            }

            .mail{
                display:block;
                margin-top:10px;
                width:212px;
                padding-top:5px;
                padding-bottom:5px;
            }
            
            .signup{
                background-color:rgb(83, 83, 231);
                color:white;
                font-weight:bold;
                border:none;
                width:219px;
                padding-top:10px;
                padding-bottom:10px;
                padding-left:60px;
                padding-right:60px;
                border-radius:5px;
                margin-top:10px;

                
            }
        </style>
    </head>
    <body>
        <input class="name1" type="text" placeholder="First name">
        <input class="name2" type="text" placeholder="First name">
        <input class="mail" type="text" placeholder="Email">
        <button class="signup">Sign Up</button>
    </body>
</html>
