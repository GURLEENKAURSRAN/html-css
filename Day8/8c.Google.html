<!DOCTYPE html>
<html>
    <head>
        <title>Text Boxes</title>
        <style>
            body{
                image-orientation:center;
            }

            .img{
                display:block;
                width:200px;
                margin-bottom:0px;
                object-position:center;
                margin-left:95px;
            }

            .search{
                width:400px;
                padding-left:5px;
                padding-right:5px;
                padding-top:7px;
                padding-bottom:7px;
                border-radius:15px;
                border-color:gray;
                border-style:solid;
                border-width:thin;
                border:none;
                box-shadow: 1px 1px 10px rgba(0,0,0,0.15);
                margin-top:10px;
            
            }
        </style>
    </head>
    <body>
        <img class="img" src="google.webp" >
        <input class="search" type="text" placeholder="Search Google  or type a URL" >
    </body>
</html>
