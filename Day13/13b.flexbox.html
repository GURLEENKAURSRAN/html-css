<!DOCTYPE html>
<html>
    <head>
        <title>My flexbox</title>
        <style>
            
            .row-item{
                display:flex;
                width:37px;
                background-color:black;
                color:white;    
                justify-content:start;
                align-items:center;
            }

            .row2{
                display:flex;
                flex-direction:row;
                justify-content:space-between;
            }

        </style>
    </head>
    <body>
        <div style="
            display:flex;
            flex-direction:row;
            height:50px;
            ">

            <div class="column1" style="background-color:lightpink; width:100px; "></div>
            <div class="column2" style="background-color:lightblue; width:200px;">
                <div>row1</div>
                <div class="row2">
                    <div class="row-item">row2</div>
                    <div class="row-item">row2</div>
                </div>
            </div>
        </div>

    </body>
</html>
