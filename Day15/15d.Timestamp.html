<!DOCTYPE html>
<html>
    <head>
        <title>Bottom-Right box</title>
        <style>
            .box{
                background-color:rgb(158, 157, 157);
                position:fixed;
                bottom:15px;
                right:15px;
                height:180px;
                width:320px;
            }

            .close-button{
                background-color:black;
                color:white;
                position:absolute;
                top:-14px;
                left:-14px;
                font-family:arial;
                font-size:15px;
                padding-left:6px;
                padding-right:6px;
                padding-top:6px;
                padding-bottom:6px;
                height:20px;
                width:20px;
                border-radius:20px;
                display:flex;
                justify-content:center;
                align-items:center;
            }

            .time{
                background-color:black;
                color:white;
                font-family:arial;
                position:absolute;
                bottom:5px;
                right:5px;
                border:none;
                border-radius:3px;
                z-index:2;
            }
        </style>
    </head>
    <body style="height:3000px;">
            <div class="box">
                <div class="close-button">X</div>
                <div class="time">0:29</div>
            </div>
    </body>
</html>
