<!DOCTYPE html>
<html>
    <head>
        <title>Grid with 2 columns</title>
        <style>
        .grid{
            display:grid;
            grid-template-columns: 50px 1fr 75px
        }

        .col2{
            background-color:lightpink;
        }

        .col1{
            background-color:lightblue;
        }

        .col3{
             background-color:lightblue;
    
        }
        </style>
    </head>
    <body>
        <div class="grid">
            <p class="col1">col1</p>
            <p class="col2">col2</p>
            <p class="col3">col3</p>
        </div>
    </body>
</html>
