<!DOCTYPE html>
<html>
    <head>
        <title>Grid with 2 columns</title>
        <style>
        .grid{
            display:grid;
            grid-template-columns: 200px 75px
        }

        .col2{
            background-color:lightpink;
        }

        .col1{
            background-color:lightblue;
        }
        </style>
    </head>
    <body>
        <div class="grid">
            <p class="col1">200px</p>
            <p class="col2">75px</p>
        </div>
    </body>
</html>
