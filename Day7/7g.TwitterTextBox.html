<!DOCTYPE html>
<html>
    <head>
        <title>Image</title>
        <style>
            .circle-image{
                width:50px;
                height:50px;
                border:none;
                border-radius:50px;
                vertical-align:middle;
            }

            .paragraph{
                font-family:arial;
                font-size:15px;
                vertical-align:middle;
                color:gray;
                margin-left:10px;
                margin-right:80px;;
            }

            .tweet{
                background-color:rgb(4, 103, 216);
                color:white;
                border:none;
                width:60px;
                height:30px;
                border-radius:15px;
                font-weight:bold;
            }

        </style>
    </head>

    <body>
        <img class="circle-image" src="thumbnail/thumbnail-2.webp">
        <p class="paragraph" style="display:inline" >What's happening?</p>
        <button class="tweet">Tweet</button>
    </body>
</html>
