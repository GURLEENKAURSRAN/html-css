<!DOCTYPE html>
<html>
    <head>
        <title>Design</title>
        <style>
            .button1,.button2,.button3{
                background-color:rgb(73, 73, 248);
                color:white;
                font-weight:bold;
                height:20px;
                border:none;
                border-radius:10px;
            }
            .button1{
                width:30px;
            }
            .button2{
                width:22px;
            }

            .button3{
                width:22px;
             }

             .line{
                margin-bottom:14px;
                display:flex;
                justify-content:space-between;

             }
        </style>
    </head>
    <body>


        <div style="
            display:flex;
            flex-direction:column;
            width:200px;
            padding-right:10px;
            padding-top:10px;
            padding-left:10px;
            border-radius:5px;
            box-shadow:0 0  10px rgba(0,0,0,0.3)
            ">
            <div class="line">
                Home
                <button class="button1">14</button>
            </div>

            <div class="line">
                Notifications
                <button class="button2">3</button>
            </div>

            <div class="line">
                Messages
                <button class="button3">5</button>
            </div>
        </div>
    </body>
</html>
