<!DOCTYPE html>
<html>
    <head>
        <title>design</title>
        <style>
            .search{
                width:400px;
                height:20px;
                background-color:white;
                border-radius:10px;
                border:none;
                max-width:700px;
                padding-left:15px;
            }
            .button{
                height:20px;
                margin-right:10px;
                border-width:1px;
                background-color:purple;
                color:white;
                border-color:white;
                border-style:solid;
            }

            .para{
                color:white;
                margin-left:10px;
                font-family:arial;
            }
        </style>
    </head>
    <body>
        <div style="
            display:flex;
            flex-direction:row;
            height:40px;
            background-color:purple;
            justify-content:space-between;
            align-items:center"
            >
            <p class="para">Home</p>
            <input class="search" type="text" placeholder="Search">
            <button class="button">Download</button>
        </div>
    </body>
</html>
