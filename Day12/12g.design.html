<!DOCTYPE html>
<html>
    <head>
        <title>Design</title>
        <style>
            .thumbnail{
                width:40px;
                height:40px;
                border-radius:20px;
                object-fit:cover;
                margin-right:15px;
            }

            .about{
                display:flex;
                flex-direction:column;
                font-size:14px;
                font-family:arial;
                width:150px;
            }

            .row{
                display:flex;
                flex-direction:row;
                align-items:center;
                width:250px;
                justify-content:space-between;
                margin-bottom:15px;

            }

            .button{
                background-color:rgb(66, 66, 253);
                color:white;
                font-weight:bold;
                height:20px;
                border-radius:4px;
                border:none;
                cursor:pointer;
            }

            p{
                margin-top:0px;
                margin-bottom:0px;
                font-family:arial;
            }
        </style>
    </head>
    <body>
                <div class="row">
                    <img class="thumbnail" src="photo1.jpeg">
                    <div class="about">
                        <p style="font-weight:600">Oliver</p>
                        <p style="font-weight:thin; color:gray; font-size:13px ">the cat</p>
                        <p style="font-weight:thin; color:gray; font-size:11px">Popular</p>
                    </div>
                    <button class="button">Follow</button>
                </div>
            

            <div class="row">
                <img class="thumbnail" src="photo2.jpeg">

                <div class="about">
                <p style="font-weight:600">Mimi</p>
                <p style="font-weight:thin; color:gray; font-size:13px">Sleepy Cat</p>
                <p style="font-weight:thin; color:gray; font-size:11px">Popular</p>
                </div>
                <button class="button">Follow</button>
            </div>

            <div class="row">
                <img class="thumbnail" src="photo3.jpg">

                <div class="about">
                <p style="font-weight:600">Rex</p>
                <p style="font-weight:thin; color:gray; font-size:13px">Happy Bulldog</p>
                <p style="font-weight:thin; color:gray; font-size:11px">Popular</p>
                </div>
                <button class="button">Follow</button>
            </div>
        </div>
    </body>
</html>
