<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox Practice</title>
    </head>
    <body style="padding-bottom:500px;">
        <div style="
            display:flex;
            flex-direction:row;
            margin-bottom:10px;
            ">
            <div style="Background-color:lightblue;">div1 text</div>
            <div style="Background-color:lightpink;">div2 <p>text</p></div>
        </div>

        <div style="
            display:flex;
            flex-direction:row;
            ">
            <div style="Background-color:lightblue; width:200px;" > 200px</div>
            <div style="Background-color:lightpink; flex:1;">flex: 1</div>
            <div style="Background-color:lightblue; flex:2;" >flex:2</div>

        </div>

        <div style="
        display:flex;
        flex-direction:row;
        margin-top:10px;
        height:50px;
        border-width:1px;
        border-color:gray;
        border-style:solid;
        border-style:solid;
        justify-content:center;
        ">
             <div style="Background-color:lightblue; width:100px;" > 100px</div>
            <div style="Background-color:lightpink; width:100px;">100px</div>
            <div style="Background-color:lightblue; width:100px;" >100px</div>
        </div>

        <div style="
        display:flex;
        flex-direction:row;
        margin-top:10px;
        height:50px;
        border-width:1px;
        border-color:gray;
        border-style:solid;
        border-style:solid;
        justify-content:space-between;
        ">
             <div style="Background-color:lightblue; width:100px;" > 100px</div>
            <div style="Background-color:lightpink; width:100px;">100px</div>
            <div style="Background-color:lightblue; width:100px;" >100px</div>
        </div>

        <div style="
        display:flex;
        flex-direction:row;
        margin-top:10px;
        height:50px;
        border-width:1px;
        border-color:gray;
        border-style:solid;
        border-style:solid;
        justify-content:space-between;
        align-items:center;
        ">
             <div style="Background-color:lightblue; width:100px;" > 100px</div>
            <div style="Background-color:lightpink; width:100px;">100px</div>
            <div style="Background-color:lightblue; width:100px;" >100px</div>
        </div>
    </body>
</html>
