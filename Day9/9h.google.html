<!DOCTYPE html>
<html>
    <head>
        <title>Text Boxes</title>
        <style>
            .div{
                text-align:center;
            }


            .img{
                width:200px;
                margin-bottom:20px;
                
            }

            .search{
                width:400px;
                padding-top:7px;
                padding-bottom:7px;
                border-radius:15px;
                border-color:gray;
                border-style:solid;
                border-width:thin;
                border:none;
                box-shadow: 1px 1px 10px rgba(0,0,0,0.15);
                margin-top:10px;
            
            }
        </style>
    </head>
    <body>
        <div class="div">
        <img class="img" src="google.webp" >
        <input class="search" type="text" placeholder="Search Google  or type a URL" >
        </div>
    </body>
</html>
