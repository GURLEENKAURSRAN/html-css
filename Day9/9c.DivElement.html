<!DOCTYPE html>
<html>
    <head>
        <title>Button with div</title>
        <style>
            .div{
                width:300px;
                height:80px;
                border-width:1px;
                border-style:solid;
                border-color:gray;
                padding-bottom:5px;
                padding-left:16px;
            }

            .satisfaction{
                font-family:arial;
                font-size:14px;  
            }

            .yes{
                 font-family:arial;
                  margin-bottom:0px;  

            }

            .no{                    
                font-family:arial;
                 margin-bottom:0px;  

            }

        </style>
    </head>
    <body>
        <div class="div" >
            <p class="satisfaction">
                Satisfied with our service?
            </p>
            <button class="yes">
                Yes
            </button>
            <button class="no">
                No
            </button>
        </div>
    </body>
</html>
