<!DOCTYPE html>
<html>
    <head>
        <title>YouTube.com Clone</title>
        <style>
           .thumbnail{
                width:250px;
                object-fit:contain;
                object-position:centerf;
                border:none;
                display:inline-block;
           }
           
           .search-bar{
            display:block;
            width:700px;
            margin-bottom:20px;
           }

            .video-tittle{
            display:inline-block;
            }

            .video-preview{
                width:250px;
                display:inline-block;
                vertical-align:top;
                margin-right:20px;
        
            }

        </style>
    </head>  
    <body>
        <input class="search-bar" type="text" placeholder="Search">

        <div class="video-preview">
            <img class="thumbnail" src="thumbnail-1 (1).webp">
            <p class="video-tittle">Talking <strong>Tech and AI</strong> with Google CEO Sundar Pichai!</p>
            <p class="channel-name">Marques Brownlee </p>
            <p class="video-stats">3.4M views &middot; 6 months ago</p>
        </div>

        <div class="video-preview">
            <img class="thumbnail" src="thumbnail-2.webp">
            <p class="video-tittle">Try Not To Laugh Challenge #9</p>
            <p class="channel-name">Markiplier</p>
            <p class="video-stats">19M views &middot; 4 years ago</p>
        </div>
    </body>
</html>
