<!DOCTYPE html>
<html>
    <head>
        <title>YouTube.com Clone</title>
        <style>
            .facebook{
                width:125px;
                box-shadow: 5px 5px 10px rgba(0,0,0,0.15);
                border-color:gray;
                padding-bottom:15px;
                padding-left:15px;
                display:inline-block
            }

           .thumbnail{
                width:125px;
                height:125px;
                object-fit:cover;
                object-position:right;
                display:block;
           }
           
           .name{
            display:block;
            width:150px;
            margin-bottom:20px;
            font-family:arial;
            font-weight:bold;
            margin-bottom:0px;
            font-size:25
           }

            .mutual{
            display:block;
            width:150px;
            color:gray;
            font-family:arial;
            font-size:12px;
            font-weight:500;
            margin-top:5px;
            margin-bottom:0px;
            }

            .add{
                height:25px;
                display:block;
                margin-right:20px;
                background-color:rgb(75, 75, 250);
                color:white;
                border:none;
                border-radius:5px;
                margin-top:10px;
                font-size:12px;
        
            }

        </style>
    </head>  
    <body>

        <div class="facebook">
            <img class="thumbnail" src="thumbnail-1 (1).webp">
            <p class="name">Oliver</p>
            <p class="mutual">2 mutual friends</p>
            <button class="add">Add Friend</button>
        </div>

        <div class="facebook">
            <img class="thumbnail" src="photo1.webp.jpg">
            <p class="name">Mimi</p>
            <p class="mutual">3 mutual friends</p>
            <button class="add">Add Friend</button>
        </div>

        <div class="facebook">
            <img class="thumbnail" src="photo1.webp">
            <p class="name">Rex</p>
            <p class="mutual">4 mutual friends</p>
            <button class="add">Add Friend</button>
        </div>
    </body>
</html>
