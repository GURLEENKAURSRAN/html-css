<!DOCTYPE html>
<html>
    <head>
        <title>Tweet botton with circle-image</title>
        <style>
            .div{
                box-shadow: 5px 5px 10px rgba(0,0,0,0.15);
                width:350px;
                display:inline-block;
                padding-top:10px;
                padding-bottom:10px;
                padding-left:10px;
                padding-right:0px;
            }

            .circle-image{
                width:35px;
                height:35px;
                border:none;
                border-radius:35px;
                vertical-align:middle;
            }

            .paragraph{
                font-family:arial;
                font-size:15px;
                vertical-align:middle;
                color:gray;
                margin-left:10px;
                margin-right:80px;;
            }

            .tweet{
                background-color:rgb(4, 103, 216);
                color:white;
                border:none;
                width:60px;
                height:30px;
                border-radius:15px;
                font-weight:bold;
            }

        </style>
    </head>

    <body>
        <div class="div">
        <img class="circle-image" src="thumbnail-3.webp">
        <p class="paragraph" style="display:inline" >What's happening?</p>
        <button class="tweet">Tweet</button>
        </div>
    </body>
</html>
