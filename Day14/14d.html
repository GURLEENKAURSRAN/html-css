<!DOCTYPE html>
<html>
    <head>
        <title>CSS position</title>
        <style>
            .right-sidebar{
                background-color:rgba(40, 160, 40, 0.952);
                color:white;
                position:fixed;
                bottom:0;
                right:0;
                top:0;
                width:100px;
            }

            .overlay{
                background-color:rgba(0,0,0,0.8);
                top:0;
                position:fixed;
                bottom:0;
                left:0;
                right:0
            }

            .modal{
                background-color:white;
                position:fixed;
                top:230px;
                bottom:230px;
                left:500px;
                right:500px;
                border-radius:8px;
                padding-left:12px;
                font-family:arial;
            }

            p{
                font-weight:500;
            }
        </style>
    </head>

    <body style="height:3000px;">
        <div class="right-sidebar">right sidebar</div>
        <div class="overlay">
            <div class="modal">
                <h2>Modal Title</h2>
                <p>This is a modal</p>
                <button>Close</button>
                </div>
           </div>
    </body>
</html>
